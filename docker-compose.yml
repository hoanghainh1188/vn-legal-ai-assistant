# Postgres + Auth do Supabase local stack cung cấp — chạy riêng bằng `supabase start`
# (KHÔNG khai báo ở đây). File này chỉ đóng gói backend FastAPI.
#
# Postgres của Supabase local mặc định ở cổng 54422 trên host (project này đổi dải 544xx
# để tránh xung đột với project Supabase khác). Từ trong container, dùng host.docker.internal.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VN_LEGAL_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - VN_LEGAL_DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:54422/postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"
