services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - VN_LEGAL_OLLAMA_BASE_URL=http://host.docker.internal:11434
      - VN_LEGAL_CHROMA_PERSIST_DIR=/app/chroma_data
    volumes:
      - chroma_data:/app/chroma_data
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  chroma_data:
