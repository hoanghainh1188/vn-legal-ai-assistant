name: template-smoke-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Kiểm tra các file cấu hình tồn tại
        run: |
          test -f CLAUDE.md
          test -f bootstrap.sh
          test -f .claude/settings.json
          test -f .claude/agents/design-intake.md
          test -f .claude/agents/code-reviewer.md
          test -f .claude/commands/design-to-code.md
          test -f docs/00-glossary.md
          test -f docs/CONSTITUTION_APPEND.md
          test -f .claude-plugin/plugin.json
          test -f .claude-plugin/marketplace.json
          echo "✓ Cấu trúc template hợp lệ"

      - name: Kiểm tra bootstrap.sh chạy được (dry run)
        run: bash -n bootstrap.sh

      - name: Kiểm tra JSON hợp lệ
        run: |
          python3 -c "import json; json.load(open('.claude/settings.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/plugin.json'))"
          python3 -c "import json; json.load(open('.claude-plugin/marketplace.json'))"
          echo "✓ JSON hợp lệ"

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Cài dependencies
        run: npm ci
      - name: Type-check
        run: npx tsc --noEmit
      - name: Unit test + coverage (Vitest)
        run: npm run test:coverage
